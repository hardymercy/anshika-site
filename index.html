<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Anshika Semwal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#a1c4fd,#c2e9fb);

overflow:hidden;

}

/* FLOATING BLOBS */

.blob{

position:absolute;
border-radius:50%;
filter:blur(80px);
opacity:.7;

animation:float 8s ease-in-out infinite;

}

.blob1{

width:300px;
height:300px;

background:#ff9a9e;

top:-80px;
left:-80px;

}

.blob2{

width:350px;
height:350px;

background:#a18cd1;

bottom:-100px;
right:-100px;

animation-delay:2s;

}

.blob3{

width:250px;
height:250px;

background:#fad0c4;

bottom:120px;
left:120px;

animation-delay:4s;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-30px)}
100%{transform:translateY(0)}

}

/* CARD */

.card{

width:360px;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(18px);

border-radius:24px;

box-shadow:0 25px 60px rgba(0,0,0,0.25);

overflow:hidden;

transition:.35s;

z-index:10;

}

.card:hover{

transform:translateY(-8px) scale(1.02);

}

/* IMAGE */

.photo{

width:100%;
height:420px;
object-fit:cover;

}

/* CONTENT */

.content{

padding:28px;
text-align:center;

}

.name{

font-size:28px;
font-weight:600;

margin-bottom:18px;

color:#222;

}

.insta{

display:inline-block;

padding:13px 26px;

border-radius:40px;

background:linear-gradient(45deg,#fd1d1d,#e1306c,#833ab4);

color:white;

text-decoration:none;

font-size:15px;

transition:.3s;

box-shadow:0 10px 25px rgba(0,0,0,0.3);

}

.insta:hover{

transform:scale(1.08);

box-shadow:0 15px 35px rgba(0,0,0,0.4);

}

.subtitle{

margin-top:12px;
font-size:14px;
color:#555;

}

</style>

</head>

<body>

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<div class="card">

<img src="photo.jpg.jpeg" class="photo">

<div class="content">

<div class="name">
Anshika Semwal
</div>

<a class="insta" href="https://www.instagram.com/anshikasemwal_/" target="_blank">

Follow on Instagram

</a>

<div class="subtitle">
Welcome to my page ✨
</div>

</div>

</div>

</body>

</html>
